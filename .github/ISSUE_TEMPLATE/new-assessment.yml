name: Method assessment
description: Submit a new method assessment
title: "[Assessment request]: "
labels: ["method", "assessment"]
assignees:
  - estopinj
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this method assessment!
  - type: input
    id: method_name
    attributes:
      label: Target method name
      description: Name of the existing or intended method page to assess.
      placeholder: ex. Synthetic Control Method
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: Page’s Author & Date
      placeholder: ex. Jean Dupont, 14/06/2026
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Assessment logic
        - The assessment should be based on the method's capacity to address a set of objectives, its compatibility with different data types, the assumptions it relies on, etc.
        - Situate the method against the unified criteria of NaviDAM will next enable users to filter down the approaches suited to their needs.
        - There are two types of criteria:
          - *Multiple* - Tick **all** the options that apply to the method.
          - *Ordinal* - Options are ordered and selecting one implies that higher (next) options in the dropdown meanu are also satisfied.

        ### NB
        - One entry can actually correspond to a family of methods (e.g. DiD), with many variants satisfying different criteria. In this case, the assessment should be based on the most common or original variant of the method and major variants that are already widespread. As most criteria accept multiple optios, assessors can tick all that apply.
        - Rationale and comments can be added at the end of the form to justify the assessment and provide any additional information.

        *See the [criteria description](https://estopinj.github.io/dam/criteria) for more details on the criteria and how to assess them*

  - type: markdown
    attributes:
      value: |
        ## Objective

  - type: checkboxes
    id: objective
    attributes:
      label: Objective
      description: Tick all the objectives that the method can address
      options:
        - label: Effect estimation
        - label: Causal relationship(s)
        - label: Predictive task + interpretability
        - label: Detection
        - label: Significance and robustness tests
        - label: Scenario projection
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Outcome
  
  - type: checkboxes
    id: estimand
    attributes:
      label: Estimand
      multiple: true
      options:
        - ATT
        - ATE
        - LATE
        - CATE
        - Mediation effects
        - Oriented link
        - Risk ratios
        - Maps & generalisations
        - Others
        - Inapplicable
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: |
        ## Data compatibility
  
  - type: dropdown
    id: data_type
    attributes:
      label: Type
      multiple: true
      options:
        - Spatial only (cross-sectional)
        - Time-series (one sample)
        - Panel data (many samples)
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: required_ts_length
    attributes:
      label: Required TS length
      multiple: true
      options:
        - Handles ≤ 10
        - ≥ 10
        - ≥ 100
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: handles_few_samples
    attributes:
      label: Handles few samples
      options:
        - Yes CT design
        - Yes ≤ 10
        - 10 to 100
        - "No"
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: handles_huge_datasets
    attributes:
      label: Handles huge datasets (n)
      options:
        - "Yes"
        - Most do
        - Most dont
        - "No"
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: handles_missing_data
    attributes:
      label: Handles missing data
      options:
        - "Yes"
        - Partially
        - "No: requires prelim. correction"
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: rs_data_proven
    attributes:
      label: RS-data proven
      options:
        - "Yes"
        - Few applications
        - "No"
        - Inapplicable
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: |
        ## Assumptions
  
  - type: dropdown
    id: functional_form
    attributes:
      label: Functional form
      multiple: true
      options:
        - Linear
        - Quadratic
        - Non-linear
        - Additivity
        - Assumption-free
        - Rule-based
        - Log-linear
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: no_unobserved_confounders
    attributes:
      label: No unobserved confounders
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Time-varying OR site-varying
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: no_interference
    attributes:
      label: No interference
      multiple: true
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Not required
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: well_defined_treatments
    attributes:
      label: Well-defined treatments
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: common_support_positivity
    attributes:
      label: Common support (positivity)
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: causal_markov_condition
    attributes:
      label: Causal Markov Condition
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: faithfulness
    attributes:
      label: Faithfulness
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: idd
    attributes:
      label: IDD
      options:
        - Required
        - Recommended
        - Desirable
        - Relaxes assumption
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: model_specific_assumptions
    attributes:
      label: Model-specific assumptions
      multiple: true
      options:
        - Parallel trends
        - Stationarity
        - Dispersal / reproduction / mortality
        - Instrument validity
        - Normality of random effects
        - No M-O confounding
        - Good covariate balance
        - Effect entirely mediated
        - Cutoff + PO continuity
        - B/A treatment obs.
        - Good pretreatment fit
        - No specific
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: | 
        ## Model properties
  
  - type: dropdown
    id: requires_explicit_processes
    attributes:
      label: Requires explicit processes
      options:
        - "Yes"
        - Optional
        - Agnostic
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: exposure_type
    attributes:
      label: Exposure type
      multiple: true
      options:
        - Binary
        - Categorical
        - Continuous / Time-varying
        - Compositional
        - Multivariate
        - Others
        - All
        - Inapplicable        
    validations:
      required: true
  
  - type: dropdown
    id: number_of_variables
    attributes:
      label: Number of variables
      multiple: true
      options:
        - Univariate
        - Bivariate
        - Multivariate
        - High-dimensional (p≫n)
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: handles_lag_effects
    attributes:
      label: Handles lag effects
      options:
        - "Yes"
        - Possible
        - "No"
        - Inapplicable
    validations:
      required: true

  - type: dropdown
    id: propagates_uncertainty
    attributes:
      label: Propagates uncertainty
      options:
        - Inherent capacity
        - Model-specific tools
        - Needs model-agnostic propagation
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: parametric_nature
    attributes:
      label: Parametric nature
      multiple: true
      options:
        - Parametric
        - Semi-parametric
        - Non-parametric
        - Rule-based
        - Inapplicable
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: | 
        ## Packages
  
  - type: dropdown
    id: language
    attributes:
      label: Language
      multiple: true
      options:
        - R
        - Python
        - GIS
        - Others
        - No package
        - Inapplicable
    validations:
      required: true
  
  - type: dropdown
    id: usage
    attributes:
      label: Usage
      options:
        - User-friendly
        - Technical but well documented
        - Sparse documentation
        - Domain-specific skills
        - Varying
        - Inapplicable
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale and additional comments
      placeholder: Any rationale you would like to share about the method assessment, how/why some options were chosen, or any other comment you would like to share.
    validations:
      required: false
  
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
